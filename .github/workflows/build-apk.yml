# Build Android APK without EAS (no Expo account needed).
# On push to main or manual run: produces app-debug.apk as artifact.
name: Build APK (no EAS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build-tools
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        run: cd android && ./gradlew app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
